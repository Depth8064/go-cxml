name: Feature request
description: Suggest an improvement or new capability.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: Describe the pain point.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative designs you evaluated?
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: Compatibility and impact
      description: Note API, behavior, or migration implications.
    validations:
      required: false
