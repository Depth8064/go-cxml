name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./cxml/...

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./cxml/...

      - name: Check coverage
        run: |
          go tool cover -func=coverage.out | grep -E '^total:' | awk '{if ($3 != "100.0%") {print "Coverage is " $3 ", expected 100.0%"; exit 1}}'
